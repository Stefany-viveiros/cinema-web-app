<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Sessão 🎬</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<header>🎬 Sua Sessão</header>

<!-- TELÃO -->
<div id="screen" class="screen-player"></div>

<!-- INFO -->
<div class="info">
  <h2 id="movieTitle"></h2>
  <p>🍿 Aproveite seu filme!</p>
</div>

<!-- BOTÃO -->
<button onclick="toggleSnackBar()" class="open-snack">🍿</button>

<!--SIDEBAR -->
<div class="snack-bar">
  <h3>🍿 Bomboniere</h3>

  <button onclick="addToCart('Pipoca', 15)">Pipoca - R$15</button>
  <button onclick="addToCart('Refri', 10)">Refri - R$10</button>
  <button onclick="addToCart('Combo', 20)">Combo - R$20</button>

  <div id="cart"></div>
</div>

<script src="../js/session.js"></script>
<script src="../js/cart.js"></script>

</body>
</html>
